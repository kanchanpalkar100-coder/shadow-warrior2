<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Shadow Warrior</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= LOADING SCREEN ================= -->

<div id="loadingScreen" class="screen active">

    <h1 class="game-title">SHADOW WARRIOR</h1>

    <div id="loadingBar">
        <div id="loadingFill"></div>
    </div>

    <p id="loadingText">Loading Assets...</p>

</div>

<!-- ================= MAIN MENU ================= -->

<div id="mainMenu" class="screen">

    <h1 class="game-title">
        SHADOW WARRIOR
    </h1>

    <button id="playBtn">
        Play
    </button>

    <button id="trainingBtn">
        Training
    </button>

    <button id="settingsBtn">
        Settings
    </button>

</div>

<!-- ================= SETTINGS SCREEN ================= -->

<div id="settingsScreen" class="screen">

    <h2>Settings</h2>

    <div class="settings-group">

        <label>Master Volume</label>
        <input type="range" id="masterVolumeSlider" min="0" max="1" step="0.01" value="0.7">

        <label>Music Volume</label>
        <input type="range" id="musicVolumeSlider" min="0" max="1" step="0.01" value="0.4">

        <label>Effects Volume</label>
        <input type="range" id="effectsVolumeSlider" min="0" max="1" step="0.01" value="0.8">

        <label>Show Damage Numbers</label>
        <input type="checkbox" id="showDamageToggle" checked>

        <label>Mobile Controls</label>
        <input type="checkbox" id="mobileControlsToggle">

    </div>

    <button id="settingsBackBtn">Back</button>

</div>

<!-- ================= CHARACTER SELECT ================= -->

<div id="characterSelect" class="screen">

    <h2>Select Fighter</h2>

    <div class="fighters">

        <div class="fighter-card selected" data-character="shadow">
            <div class="fighter-preview shadow-preview"></div>
            <p>Shadow</p>
            <span class="fighter-stat">Speed: ★★★★☆</span>
            <span class="fighter-stat">Power: ★★★☆☆</span>
        </div>

        <div class="fighter-card" data-character="ronin">
            <div class="fighter-preview ronin-preview"></div>
            <p>Ronin</p>
            <span class="fighter-stat">Speed: ★★☆☆☆</span>
            <span class="fighter-stat">Power: ★★★★★</span>
        </div>

        <div class="fighter-card" data-character="ninja">
            <div class="fighter-preview ninja-preview"></div>
            <p>Ninja</p>
            <span class="fighter-stat">Speed: ★★★★★</span>
            <span class="fighter-stat">Power: ★★☆☆☆</span>
        </div>

    </div>

    <div class="difficulty-select">
        <label>Difficulty:</label>
        <select id="difficultySelect">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
            <option value="boss">Boss</option>
        </select>
    </div>

    <button id="startBattleBtn">
        Start Battle
    </button>

    <button id="charBackBtn">
        Back
    </button>

</div>

<!-- ================= GAME UI ================= -->

<div id="gameUI">

    <!-- Player HP -->

    <div class="bar-group left">

        <div class="name" id="playerName">
            PLAYER
        </div>

        <div class="health-bar">
            <div id="playerHealth"></div>
        </div>

        <div class="energy-bar">
            <div id="playerEnergy"></div>
        </div>

    </div>

    <!-- Combo Display -->

    <div id="comboDisplay">
        <span id="comboCount"></span>
        <span id="comboLabel"></span>
    </div>

    <!-- Enemy HP -->

    <div class="bar-group right">

        <div class="name" id="enemyName">
            ENEMY
        </div>

        <div class="health-bar">
            <div id="enemyHealth"></div>
        </div>

        <div class="energy-bar">
            <div id="enemyEnergy"></div>
        </div>

    </div>

</div>

<!-- ================= GAME CANVAS ================= -->

<canvas id="gameCanvas"></canvas>

<!-- ================= MOBILE CONTROLS ================= -->

<div id="mobileControls">

    <div id="dpad">
        <button class="dpad-btn" id="btnLeft">◀</button>
        <button class="dpad-btn" id="btnJump">▲</button>
        <button class="dpad-btn" id="btnRight">▶</button>
    </div>

    <div id="actionButtons">
        <button class="action-btn punch-btn" id="btnPunch">P</button>
        <button class="action-btn kick-btn" id="btnKick">K</button>
        <button class="action-btn weapon-btn" id="btnWeapon">W</button>
    </div>

</div>

<!-- ================= PAUSE MENU ================= -->

<div id="pauseMenu" class="overlay">

    <h2>Paused</h2>

    <button id="resumeBtn">
        Resume
    </button>

    <button id="saveBtn">
        Save Game
    </button>

    <button id="settingsPauseBtn">
        Settings
    </button>

    <button id="quitBtn">
        Quit
    </button>

</div>

<!-- ================= VICTORY SCREEN ================= -->

<div id="victoryScreen" class="overlay">

    <h1 id="winnerText">
        Victory
    </h1>

    <div id="battleStats">
        <p id="statDamage"></p>
        <p id="statCombo"></p>
    </div>

    <button id="playAgainBtn">
        Play Again
    </button>

</div>

<!-- ================= AUDIO ================= -->

<audio id="bgMusic" src="assets/audio/music.mp3" loop></audio>
<audio id="punchSound" src="assets/audio/punch.mp3"></audio>
<audio id="kickSound" src="assets/audio/kick.mp3"></audio>
<audio id="swordSound" src="assets/audio/sword.mp3"></audio>
<audio id="victorySound" src="assets/audio/victory.mp3"></audio>

<!-- ================= SCRIPTS — ORDER MATTERS ================= -->
<!-- 1. Audio must load before player/enemy (they call AudioManager at runtime) -->
<!-- 2. Weapons (defines Inventory) must load before save.js (uses Inventory) -->
<!-- 3. New systems load before game.js which orchestrates everything -->

<script src="js/audio.js"></script>
<script src="js/weapons.js"></script>
<script src="js/save.js"></script>
<script src="js/AnimationManager.js"></script>
<script src="js/AssetLoader.js"></script>
<script src="js/ParticleSystem.js"></script>
<script src="js/ComboSystem.js"></script>
<script src="js/player.js"></script>
<script src="js/enemy.js"></script>
<script src="js/MobileControls.js"></script>
<script src="js/game.js"></script>

</body>
</html>
